# sdlc.config.yml — Loom project configuration
#
# Place this file in your project root. Loom reads it on every /loom:work
# and /loom:review invocation to locate the backlog and project context.

version: 1

project:
  # Absolute path to the Backlog.md repository.
  # Loom invokes the backlog CLI with BACKLOG_CWD set to this path —
  # no MCP server registration is needed. Use a full path (no ~ expansion).
  backlog_cwd: /Users/you/dev/my-project-backlog

  # Git default branch name. Omit to use "main".
  # default_branch: main

  # Named context slots. Playbooks reference these by key name.
  # Values are file paths relative to this project's root.
  # If a playbook references a slot that isn't defined here, it skips gracefully.
  context:
    # brand_voice: docs/brand/copy/brand-context.md  # produced by copy-deck playbook
    # design_system: src/app.css
    # design_system_rules: src/lib/components/app/AI_USAGE.md
    # architecture_rules: docs/ARCHITECTURE.md

  # Project conventions directory. Each .md file in this directory declares
  # which agents it targets via a frontmatter `agents:` list, and its content
  # is injected as ## project_conventions into matching agent prompts.
  # Use `agents: ["*"]` to target all agents.
  #
  # Example file (docs/conventions/mock-methodology.md):
  #   ---
  #   agents: [create-mocks, mock-alignment-reviewer]
  #   ---
  #   Mocks must use the shared _kit/ methodology...
  #
  # conventions: docs/conventions/

  # Visual verification configuration for capture-screenshots agent.
  # Defines how to start the dev server and authenticate for screenshots.
  # If omitted, the agent infers from package.json / research brief.
  # verification:
  #   dev_server:
  #     start: npm run dev            # command to start the dev server
  #     cwd: apps/web                 # working directory relative to project root
  #     port: 5173                    # port to wait for before capturing
  #     ready_pattern: "ready in"     # stdout pattern that signals the server is ready
  #   auth:
  #     script: e2e/helpers/auth.ts   # path to auth helper (relative to project root)
  #     fixture: pooledUser           # named fixture to use for authentication
  #   viewports:                      # override default viewports (optional)
  #     - { name: mobile, width: 390, height: 844 }
  #     - { name: desktop, width: 1280, height: 800 }
